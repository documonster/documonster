name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # Step 1: release-please creates/updates a release PR.
  # When the PR is merged, it creates a GitHub release + tag and sets release_created=true.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release

  # Step 2a: Canary — publish on every push except when release-please just created a release.
  # When release_created=true the merged PR commit is the trigger; we publish the real version
  # via the publish job instead, so canary is skipped.
  canary:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          CI: true

      - name: Generate canary version
        id: canary_version
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          CANARY_VERSION="${CURRENT_VERSION}-canary.${TIMESTAMP}.${COMMIT_SHORT}"
          echo "version=${CANARY_VERSION}" >> $GITHUB_OUTPUT
          node -e "const p=require('./package.json');p.version='${CANARY_VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Publish canary to npm
        run: pnpm publish --tag canary --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify canary publish
        run: |
          echo "Waiting for npm registry to propagate..."
          sleep 30
          EXPECTED_VERSION="${{ steps.canary_version.outputs.version }}"
          PUBLISHED_VERSION=$(npm view @cj-tech-master/excelts@${EXPECTED_VERSION} version 2>/dev/null || echo "NOT_FOUND")
          if [ "$PUBLISHED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Expected version ${EXPECTED_VERSION} but found ${PUBLISHED_VERSION} on npm registry"
            exit 1
          fi
          echo "Verified: @cj-tech-master/excelts@${EXPECTED_VERSION} is live on npm"

      - name: Comment on commit
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 Canary version published: \`${{ steps.canary_version.outputs.version }}\`\n\nInstall with: \`npm install @cj-tech-master/excelts@canary\``
            })

  # Step 2b: Publish — triggered only when release-please creates a release (PR merged).
  # Automatically uses --tag beta for prerelease versions, or latest for stable.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -q "beta\|alpha\|rc"; then
            echo "Publishing ${VERSION} with --tag beta"
            pnpm publish --no-git-checks --tag beta
          else
            echo "Publishing ${VERSION} as latest"
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify publish
        run: |
          echo "Waiting for npm registry to propagate..."
          sleep 30
          EXPECTED_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view @cj-tech-master/excelts@${EXPECTED_VERSION} version 2>/dev/null || echo "NOT_FOUND")
          if [ "$PUBLISHED_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "ERROR: Expected version ${EXPECTED_VERSION} but found ${PUBLISHED_VERSION} on npm registry"
            exit 1
          fi
          echo "Verified: @cj-tech-master/excelts@${EXPECTED_VERSION} is live on npm"
