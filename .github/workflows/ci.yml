name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 0 * * 1"

jobs:
  # Gate: skip all CI jobs when release-please merges (already tested in PR)
  should-run:
    runs-on: ubuntu-latest
    if: "${{ github.event_name != 'push' || (!contains(github.event.head_commit.message, 'release-please--branches--main') && !startsWith(github.event.head_commit.message, 'chore(main): release')) }}"
    steps:
      - run: echo "CI should run"

  test:
    needs: should-run
    timeout-minutes: 15
    name: Node v${{ matrix.node-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 25.x]
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set git config
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.symlinks true
        if: runner.os == 'Windows'

      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run tests
        run: pnpm test
        env:
          CI: true

  test-bun:
    needs: should-run
    timeout-minutes: 15
    name: Bun v${{ matrix.bun-version }} on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        bun-version: [latest]
        os: [ubuntu-latest, macOS-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Set git config
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.symlinks true
        if: runner.os == 'Windows'

      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run tests (Bun)
        run: bun run vitest run
        env:
          CI: true

  lint:
    needs: should-run
    timeout-minutes: 10
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run type check
        run: pnpm type

  benchmark:
    needs: should-run
    timeout-minutes: 15
    name: Measure performance impact
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run benchmark
        run: pnpm benchmark
        env:
          CI: true

  chart-oracle:
    # Opt-in real-file validation: install LibreOffice on Linux and run
    # the `chart-oracle.integration.node.test.ts` suite with the env flags
    # that enable real binary round-trips. The test file skips every
    # `it` when the flags are unset, so the rest of the matrix (which
    # doesn't install LibreOffice) keeps working unchanged.
    #
    # We gate on a single Linux runner — LibreOffice is slow to install
    # (~200MB of apt packages) and the goal is catching open-validation
    # regressions, not multiplying across OS/Node variants.
    needs: should-run
    timeout-minutes: 20
    name: Chart real-file oracle (LibreOffice)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js 26
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install LibreOffice (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-core libreoffice-calc
          soffice --headless --version

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Run chart-oracle tests
        run: pnpm exec vitest run src/modules/excel/chart/__tests__/chart-oracle.integration.node.test.ts src/modules/excel/chart/__tests__/workbook-chart-roundtrip.integration.node.test.ts
        env:
          CI: true
          LIBREOFFICE_BIN: soffice
          DOCUMONSTER_LIBREOFFICE_VISUAL_ORACLE: "1"
          DOCUMONSTER_LIBREOFFICE_OPEN_VALIDATION: "1"
          # Optional enterprise corpus — only fires when the private
          # directory is mounted into the runner (via repository
          # secret + setup action). Safe to leave unset on public PRs.
          DOCUMONSTER_ENTERPRISE_CORPUS_DIR: ${{ vars.DOCUMONSTER_ENTERPRISE_CORPUS_DIR }}
          DOCUMONSTER_CORPUS_LIBREOFFICE_OPEN_VALIDATION: "1"

  codeql:
    needs: should-run
    timeout-minutes: 10
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: +security-and-quality
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"
