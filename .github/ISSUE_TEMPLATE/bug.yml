name: "Bug report"
description: "Report a reproducible bug in ExcelTS"
title: "[Bug]: "
labels:
  - "bug"
body:
  - type: dropdown
    id: module
    attributes:
      label: "Module"
      options:
        - "Excel"
        - "Formula"
        - "PDF"
        - "CSV"
        - "Markdown"
        - "XML"
        - "Archive"
        - "Stream"
        - "Utils"
        - "Other"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "ExcelTS version"
      placeholder: "3.1.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: "Runtime"
      options:
        - "Node.js"
        - "Browser"
        - "Deno"
        - "Bun"
        - "Cloudflare Workers"
        - "Edge Runtime (Vercel/Netlify)"
        - "Electron"
        - "Other"
    validations:
      required: true

  - type: input
    id: runtime_version
    attributes:
      label: "Version"
      description: "If Node.js: v20.x. If Browser: Chrome/Firefox/Safari version."
      placeholder: "v20.11.0 / Chrome 120"
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: "Reproduction"
      placeholder: |
        ```ts
        import { Workbook } from "@cj-tech-master/excelts";

        // ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual behavior"
      render: shell
    validations:
      required: true
