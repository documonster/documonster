name: "Question"
description: "Ask a question about using ExcelTS"
title: "[Question]: "
labels:
  - "question"
body:
  - type: dropdown
    id: module
    attributes:
      label: "Module"
      options:
        - "Excel"
        - "PDF"
        - "CSV"
        - "Markdown"
        - "XML"
        - "Archive"
        - "Stream"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: "Question"
      placeholder: "What are you trying to do? What's not working?"
    validations:
      required: true

  - type: textarea
    id: snippet
    attributes:
      label: "Code snippet (optional)"
      placeholder: |
        ```ts
        // minimal code showing the problem
        ```
    validations:
      required: false
