name: "CodeQL Configuration"

query-filters:
  # Suppress "insufficient password hash" alerts globally.
  #
  # MD5 and single-pass SHA-256 are used exclusively for PDF specification
  # compliance (ISO 32000). The PDF standard mandates these algorithms for
  # encryption key derivation when reading existing encrypted PDF files:
  #   - MD5: PDF 1.7 Algorithm 2 / Algorithm 3 (RC4 and AES-128)
  #   - SHA-256: PDF 2.0 Algorithm 2.A / 2.B (AES-256, Revision 5/6)
  #
  # These are NOT used for password storage. The PDF writer uses AES-256
  # with a proper key derivation scheme. We cannot replace these algorithms
  # without breaking compatibility with every existing encrypted PDF.
  - exclude:
      id: js/insufficient-password-hash
